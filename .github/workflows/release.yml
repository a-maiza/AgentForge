name: Release to Production

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  PNPM_VERSION: "9.12.0"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/agentforge

jobs:
  # ── Validate the tag points to a commit already on main ──────────────────────
  validate:
    name: Validate Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "Error: tag must point to a commit reachable from main."
            exit 1
          fi

  # ── E2E tests ─────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [validate]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: agentforge
          POSTGRES_PASSWORD: agentforge
          POSTGRES_DB: agentforge_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/package.json') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm --filter @agentforge/web exec playwright install --with-deps chromium

      - name: Build all apps
        env:
          DATABASE_URL: postgresql://agentforge:agentforge@localhost:5432/agentforge_e2e
          REDIS_URL: redis://localhost:6379
        run: pnpm build

      - name: Run Playwright E2E suite
        env:
          DATABASE_URL: postgresql://agentforge:agentforge@localhost:5432/agentforge_e2e
          REDIS_URL: redis://localhost:6379
          BASE_URL: http://localhost:3000
        run: pnpm --filter @agentforge/web exec playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

  # ── Build and push release images ─────────────────────────────────────────────
  build-push-release:
    name: Build & Push Release (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [e2e]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [api, web, gateway, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}-release
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}-release

  # ── Deploy to production ──────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-push-release]
    environment: production
    steps:
      - uses: actions/checkout@v4

      # TODO(task 4.6.2): Replace with actual production deploy command.
      - name: Deploy to production
        run: |
          echo "Deploying ${{ github.ref_name }} to production..."
          echo "Configure production deploy (ECS update-service, K8s rollout, etc.)."

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-production]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
