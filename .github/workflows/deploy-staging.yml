name: Deploy to Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false  # Never cancel an in-flight deploy

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  PNPM_VERSION: "9.12.0"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/agentforge

jobs:
  # ── Run all PR checks first ───────────────────────────────────────────────────
  lint:
    uses: ./.github/workflows/pr-checks.yml

  # ── Integration tests ─────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: agentforge
          POSTGRES_PASSWORD: agentforge
          POSTGRES_DB: agentforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @agentforge/shared build

      - name: Run NestJS integration tests
        env:
          DATABASE_URL: postgresql://agentforge:agentforge@localhost:5432/agentforge_test
          REDIS_URL: redis://localhost:6379
        run: pnpm --filter @agentforge/api test:integration

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install worker dependencies
        working-directory: apps/worker
        run: uv sync --extra dev

      - name: Run FastAPI integration tests
        working-directory: apps/worker
        env:
          DATABASE_ASYNC_URL: postgresql+asyncpg://agentforge:agentforge@localhost:5432/agentforge_test
          REDIS_URL: redis://localhost:6379
        run: uv run pytest tests/integration -v

  # ── Build and push images to GHCR ─────────────────────────────────────────────
  build-push:
    name: Build & Push (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [test-integration]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [api, web, gateway, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=staging

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  # ── Deploy to staging ─────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-push]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      # TODO(task 4.6.2): Replace with actual staging deploy command.
      # Options: Railway CLI, Render deploy hook, AWS ECS update-service, etc.
      - name: Deploy to staging
        run: |
          echo "🚀 Deploying sha-${{ github.sha }} to staging…"
          echo "Configure STAGING_DEPLOY_HOOK or Railway/Render CLI in this step."
          # Example for Railway:
          # railway up --service api --detach
          # Example for Render deploy hook:
          # curl -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}"
