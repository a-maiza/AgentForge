services:
  # ── Data stores ──────────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: agentforge
      POSTGRES_PASSWORD: agentforge
      POSTGRES_DB: agentforge
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agentforge -d agentforge']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: agentforge
      DB_PASSWORD: agentforge
      DB_NAME: agentforge
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
    ports:
      - '5433:6432'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console → http://localhost:9001
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # Create default bucket on first start
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/agentforge-datasets &&
        echo 'MinIO bucket ready.'
      "
    restart: on-failure

  # ── Application services ──────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder # Use builder stage for dev hot-reload
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://agentforge:agentforge@postgres:5432/agentforge
      REDIS_URL: redis://redis:6379
      PORT: '3001'
      NODE_ENV: development
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/repo/apps/api/src # Hot-reload source
      - ./packages/shared/src:/repo/packages/shared/src
    command: ['pnpm', '--filter', '@agentforge/api', 'dev']
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: runner
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://agentforge:agentforge@pgbouncer:6432/agentforge
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/worker:/app # Hot-reload for dev
    command: ['uvicorn', 'main:app', '--host', '0.0.0.0', '--port', '8000', '--reload']
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
      target: builder
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://agentforge:agentforge@pgbouncer:6432/agentforge
      REDIS_URL: redis://redis:6379
      PORT: '3002'
    ports:
      - '3002:3002'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/gateway/src:/repo/apps/gateway/src
    command: ['pnpm', '--filter', '@agentforge/gateway', 'dev']
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    env_file: .env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_GATEWAY_URL: http://localhost:3002
      PORT: '3000'
    ports:
      - '3000:3000'
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/repo/apps/web/src
    command: ['pnpm', '--filter', '@agentforge/web', 'dev']
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
